name: Feature Request
description: Suggest a new feature or enhancement
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe the feature and the problem it solves.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? What use case are you addressing?
      placeholder: "I frequently need to... but currently the only way is..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like to see, as concretely as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any workarounds or alternative solutions?

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Backup methods
        - Scheduling
        - Retention
        - Notifications
        - Cloud sync
        - Authentication / security
        - UI / UX
        - API
        - Docker / deployment
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
