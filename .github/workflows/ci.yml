name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.in

      - name: Install pip-tools and compile requirements
        run: |
          pip install pip-tools
          pip-compile requirements.in -o requirements.txt
          pip-compile requirements-dev.in -o requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy app

      - name: Bandit security scan
        run: bandit -r app -c pyproject.toml

  test:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      redis:
        image: redis:7.2.5-alpine
        ports:
          - 6379:6379

    env:
      OB_REDIS_URL: redis://localhost:6379/0
      OB_SECRET_KEY: ci-test-secret-key-do-not-use-in-production
      OB_DATABASE_URL: sqlite+aiosqlite:///./test.db

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.in

      - name: Install pip-tools and compile requirements
        run: |
          pip install pip-tools
          pip-compile requirements.in -o requirements.txt
          pip-compile requirements-dev.in -o requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-fail-under=60

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
        continue-on-error: true

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Build
        run: npm run build

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-tools, pip-audit and compile requirements
        run: |
          pip install pip-tools pip-audit
          pip-compile requirements.in -o requirements.txt

      - name: Audit dependencies
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-43012
